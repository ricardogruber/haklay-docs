<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Haklay API Docs</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans', sans-serif !important;
    }

    /* HEADER */
    #haklay-header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px 0;
      background-color: #0F2132;
      width: 100%;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    #haklay-header img { max-height: 40px; width: auto; }

    /* 2. TRADUÇÃO "INTRODUCTION" -> "INTRODUÇÃO" NA SIDEBAR */
    /* Esse seletor ataca especificamente o item de introdução do Scalar */
    .sidebar-group-item[data-id="introduction"] .sidebar-group-item__label,
    button[id="v-0-introduction-0"] span {
      display: none !important;
    }
    .sidebar-group-item[data-id="introduction"]::after {
      content: "Introdução";
      padding-left: 12px;
      font-size: 14px;
      color: var(--scalar-color-1);
    }

    .scalar-app header { display: none !important; }
  </style>
</head>

<body>
  <div id="haklay-header">
    <img id="logo-img" alt="Haklay Logo" src="haklay_logo_branco.png">
  </div>

  <script
    id="api-reference"
    data-url="https://haklay-api-441658416213.us-central1.run.app/openapi.json"
  ></script>

  <script>
    const configuration = {
      theme: 'light',
      showTestRequest: true,
      // 3. TEXTO INTRODUTÓRIO MELHORADO
      description: `
## Ecossistema de Crédito Rural Inteligente
A Haklay API fornece acesso simplificado a indicadores críticos para o agronegócio. 
Através desta interface, você pode validar:
* **Score de Crédito**: Análise de risco baseada em comportamento financeiro.
* **Conformidade Ambiental**: Verificação de embargos e restrições socioambientais.
* **Dados de Frota**: Detalhamento de ativos vinculados ao produtor.
      `,
      servers: [{ url: 'https://haklay-api-441658416213.us-central1.run.app' }],
      customCss: `
        :root {
          --scalar-font: 'Noto Sans', sans-serif !important;
          --scalar-color-1: #0F2132 !important;
          --scalar-color-2: rgba(15, 33, 50, 0.6) !important;
          --scalar-color-accent: #E8BA38 !important;
          --scalar-button-1: #E8BA38 !important;
          /* 1. COR DO MÉTODO GET NA SIDEBAR */
          --scalar-color-get: #E8BA38 !important;
        }

        /* Cor do GET e cURL na área de teste (preta) */
        .p-method-get, .endpoint-path, .scalar-api-reference .code-block, .scalar-api-reference .curl {
          color: #E8BA38 !important;
        }
        
        /* Ajuste para o texto não ficar cinza no fundo escuro */
        .scalar-api-reference .code-block span {
          color: inherit;
        }

        b, strong, h1, h2 { font-weight: 700 !important; }
      `
    }

    document.getElementById('api-reference').dataset.configuration = JSON.stringify(configuration);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
</body>
</html>
