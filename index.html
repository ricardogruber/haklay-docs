<!DOCTYPE html>
<html>
  <head>
    <title>Haklay API Docs</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">

    <style>
      body { margin: 0; padding: 0; }

      /* 1. HEADER PARA IDENTIDADE VISUAL */
      #haklay-header {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 15px 0;
        background-color: #0F2132;
        width: 100%;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      #haklay-header img { max-height: 40px; width: auto; }

      /* 2. CUSTOMIZAÇÃO DE CORES (GET e TEXTOS TÉCNICOS) */
      /* Muda a cor do fundo do badge GET */
      .hook-label-get { 
        background-color: #E8BA38 !important; 
        color: #0F2132 !important; 
        font-weight: bold !important;
      }

      /* Cor do caminho (path) do endpoint */
      .operation-endpoint-path { 
        color: #E8BA38 !important; 
      }

      /* 3. TRADUÇÃO DE "INTRODUCTION" NA SIDEBAR */
      /* Localiza o item de menu pelo título e substitui o texto */
      span[title="Introduction"], 
      li[data-item-id="section/Introduction"] > label {
        font-size: 0 !important;
      }
      span[title="Introduction"]::before,
      li[data-item-id="section/Introduction"] > label::before {
        content: "Introdução";
        font-size: 14px !important;
        font-weight: 600;
      }

      /* Ajuste fino na área preta (painel da direita) */
      .redoc-controls-vp {
        background-color: #0F2132 !important;
      }
    </style>
  </head>
  <body>
    <div id="haklay-header">
      <img src="haklay_logo_branco.png" alt="Haklay Logo">
    </div>

    <div id="redoc-container"></div>

    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>

    <script>
      Redoc.init(
        'https://haklay-api-441658416213.us-central1.run.app/openapi.json', 
        {
          // Desativa o Hostname para o layout ficar mais limpo
          hideHostname: true,
          // Configurações de Tema (Onde a mágica acontece)
          theme: {
            colors: {
              primary: {
                main: '#0F2132' // Cor principal (títulos e links)
              },
              success: {
                main: '#E8BA38' // Cor que o Redoc usa para o método GET
              },
              text: {
                primary: '#0F2132'
              }
            },
            typography: {
              fontFamily: 'Noto Sans, sans-serif',
              headings: {
                fontFamily: 'Noto Sans, sans-serif',
                fontWeight: '700'
              }
            },
            rightPanel: {
              backgroundColor: '#112231', // Tom azul escuro/preto da Haklay
              textColor: '#ffffff',
              width: '40%'
            }
          }
        }, 
        document.getElementById('redoc-container')
      );
    </script>
  </body>
</html>
