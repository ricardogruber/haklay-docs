<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Haklay API Docs</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans', sans-serif !important;
    }

    #haklay-header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px 0;
      background-color: #0F2132;
      width: 100%;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    #haklay-header img { 
      max-height: 40px; 
      width: auto; 
    }

    /* Ajuste para não esconder o botão de Try-out caso ele use classes similares */
    .scalar-app header { display: none !important; }
  </style>
</head>

<body>
  <div id="haklay-header">
    <img id="logo-img" alt="Haklay Logo" src="haklay_logo_branco.png">
  </div>

  <script
    id="api-reference"
    data-url="https://haklay-api-441658416213.us-central1.run.app/openapi.json"
  ></script>

  <script>
    const configuration = {
      theme: 'light',
      // Força a exibição do botão de teste (Try-out)
      showTestRequest: true, 
      // Opcional: Define o servidor padrão caso o JSON tenha múltiplos
      servers: [
        { url: 'https://haklay-api-441658416213.us-central1.run.app' }
      ],
      customCss: `
        :root {
          --scalar-font: 'Noto Sans', sans-serif !important;
          --scalar-color-1: #0F2132 !important;
          --scalar-color-2: rgba(15, 33, 50, 0.6) !important;
          --scalar-color-accent: #E8BA38 !important;
          --scalar-button-1: #E8BA38 !important;
        }
        .p-method-get, .endpoint-path, .scalar-api-reference .code-block, .scalar-api-reference .curl {
          color: #E8BA38 !important;
        }
        b, strong, h1, h2 { font-weight: 700 !important; }
      `
    }

    document.getElementById('api-reference').dataset.configuration = JSON.stringify(configuration);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
</body>
</html>
